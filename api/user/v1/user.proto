syntax = "proto3";

package user.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "github.com/go-kratos/kratos-layout-monolith/api/user/v1;v1";

// User service - handles user related operations
service UserService {
  // Register a new user
  rpc Register (RegisterRequest) returns (RegisterReply) {
    option (google.api.http) = {
      post: "/api/user/v1/register"
      body: "*"
    };
  }

  // Login and get token
  rpc Login (LoginRequest) returns (LoginReply) {
    option (google.api.http) = {
      post: "/api/user/v1/login"
      body: "*"
    };
  }

  // Get user by id
  rpc GetUser (GetUserRequest) returns (GetUserReply) {
    option (google.api.http) = {
      get: "/api/user/v1/users/{id}"
    };
  }

  // List users
  rpc ListUsers (ListUsersRequest) returns (ListUsersReply) {
    option (google.api.http) = {
      get: "/api/user/v1/users"
    };
  }

  // Update user
  rpc UpdateUser (UpdateUserRequest) returns (UpdateUserReply) {
    option (google.api.http) = {
      put: "/api/user/v1/users/{user.id}"
      body: "user"
    };
  }

  // Delete user
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserReply) {
    option (google.api.http) = {
      delete: "/api/user/v1/users/{id}"
    };
  }
}

message User {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string phone = 4;
  string nickname = 5;
  string avatar = 6;
  int32 status = 7;
  string created_at = 8;
  string updated_at = 9;
}

message RegisterRequest {
  string username = 1 [(validate.rules).string = {min_len: 1, max_len: 64, pattern: "^[a-zA-Z0-9_-]+$"}];
  string password = 2 [(validate.rules).string = {min_len: 6, max_len: 128}];
  string email = 3 [(validate.rules).string = {email: true}];
  string phone = 4 [(validate.rules).string = {pattern: "^1[3-9]\\d{9}$", ignore_empty: true}];
}

message RegisterReply {
  int64 id = 1;
  string token = 2;
}

message LoginRequest {
  string username = 1 [(validate.rules).string = {min_len: 1, max_len: 64}];
  string password = 2 [(validate.rules).string = {min_len: 1, max_len: 128}];
}

message LoginReply {
  string token = 1;
  User user = 2;
}

message GetUserRequest {
  int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message GetUserReply {
  User user = 1;
}

message ListUsersRequest {
  int32 page = 1 [(validate.rules).int32 = {gte: 1}];
  int32 page_size = 2 [(validate.rules).int32 = {gte: 1, lte: 100}];
}

message ListUsersReply {
  int32 total = 1;
  repeated User items = 2;
}

message UpdateUserRequest {
  int64 id = 1 [(validate.rules).int64 = {gt: 0}];
  User user = 2 [(validate.rules).message.required = true];
}

message UpdateUserReply {}

message DeleteUserRequest {
  int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message DeleteUserReply {}
